spec_version: "0.1.0"
name: dashclaw-agent
version: 1.0.0
description: >
  The definitive DashClaw expert — helps developers integrate, configure, troubleshoot,
  and build the AI agent governance platform. Meta: governs itself on DashClaw.
author: ucsandman
license: MIT
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - instrument-agent
  - create-policies
  - setup-dashclaw
  - manage-approvals
  - troubleshoot
  - build-dashclaw
  - compliance-drift-evals
  - register-on-dashclaw
runtime:
  max_turns: 30
  timeout: 300
tags:
  - dashclaw
  - governance
  - ai-agents
  - security
  - compliance
  - policy-firewall
  - sdk
  - hitl
